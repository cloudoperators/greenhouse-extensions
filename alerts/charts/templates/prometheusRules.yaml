{{- if and .Values.alerts.defaultRules.create .Values.alerts.defaultRules.create.rules.alertmanager }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "kube-prometheus-stack.name" . }}-alertmanager.alerts
  labels:
    alertmanager: {{ include "kube-prometheus-stack.name" . }}
    {{- include "kube-prometheus-stack.labels" . | indent 4 }}
    {{- if .Values.alerts.defaultRules.labels }}
    {{- toYaml .Values.alerts.defaultRules.labels | nindent 4 }}
    {{- end }}
spec:
  groups:
  - name: alertmanager.alerts
    rules:
    - alert: AlertmanagerFailedConfigReload
      expr: alertmanager_config_last_reload_successful{alertmanager="{{ include "kube-prometheus-stack.name" . }}"} == 0
      for: 5m
      labels:
        severity: critical
        playbook: 'https://documentation.global.cloud.sap/docs/support/playbook/prometheus/failed_config_reload'
        {{- if or .Values.alerts.defaultRules.additionalRuleLabels }}
          {{- with .Values.alerts.defaultRules.additionalRuleLabels }}
            {{- toYaml . | nindent 6 }}
          {{- end }}
        {{- end }}
      annotations:
        description: 'Alertmanager {{`{{ $labels.alertmanager }}`}} failed to load it`s configuration. Alertmanager cannot start with a malformed configuration.'
        summary: Alertmanager configuration reload has failed

    - alert: AlertmanagerNotificationsFailing
      expr: rate(alertmanager_notifications_failed_total{alertmanager="{{ include "kube-prometheus-stack.name" . }}"}[5m]) > 0
      for: 10m
      labels:
        severity: info
        playbook: 'https://documentation.global.cloud.sap/docs/support/playbook/prometheus/alertmanager_failed_notifications'
        {{- if or .Values.alerts.defaultRules.additionalRuleLabels }}
          {{- with .Values.alerts.defaultRules.additionalRuleLabels }}
            {{- toYaml . | nindent 6 }}
          {{- end }}
        {{- end }}
      annotations:
        description: 'Alertmanager {{`{{ $labels.alertmanager }}`}} is failing to send notifications for integration {{`{{ $labels.integration }}`}}.'
        summary: Alertmanager failing to send notifications

    - alert: AlertmanagerClusterMessagesPruned
      expr: rate(alertmanager_cluster_messages_pruned_total{alertmanager="{{ include "kube-prometheus-stack.name" . }}"}[5m]) > 0
      for: 10m
      labels:
        severity: warning
        playbook: 'https://documentation.global.cloud.sap/docs/support/playbook/prometheus/alertmanager_alerts/cluster-messages-pruned'
        {{- if or .Values.alerts.defaultRules.additionalRuleLabels }}
          {{- with .Values.alerts.defaultRules.additionalRuleLabels }}
            {{- toYaml . | nindent 6 }}
          {{- end }}
        {{- end }}
      annotations:
        description: 'Alertmanager {{`{{ $labels.alertmanager }}`}} is pruning the message queue and cluster messages are dropped.'
        summary: Alertmanager in HA cluster fails to synchronize

    - alert: AlertmanagerClusterMessagesQueued
      expr: alertmanager_cluster_messages_queued{alertmanager="{{ include "kube-prometheus-stack.name" . }}"} != 0
      for: 15m
      labels:
        severity: info
        playbook: 'https://documentation.global.cloud.sap/docs/support/playbook/prometheus/alertmanager_alerts/cluster-messages-queued'
        {{- if or .Values.alerts.defaultRules.additionalRuleLabels }}
          {{- with .Values.alerts.defaultRules.additionalRuleLabels }}
            {{- toYaml . | nindent 6 }}
          {{- end }}
        {{- end }}
      annotations:
        description: 'Alertmanager {{`{{ $labels.alertmanager }}`}} is queing cluster messages. This can cause dropping messages because too many are queued.'
        summary: Alertmanager in HA cluster fails to synchronize

    - alert: AlertmanagerInvalidAlerts
      expr: rate(alertmanager_alerts_invalid_total{alertmanager="{{ include "kube-prometheus-stack.name" . }}"}[5m]) > 0
      for: 5m
      labels:
        severity: info
        {{- if or .Values.alerts.defaultRules.additionalRuleLabels }}
          {{- with .Values.alerts.defaultRules.additionalRuleLabels }}
            {{- toYaml . | nindent 6 }}
          {{- end }}
        {{- end }}
      annotations:
        description: 'Alertmanager {{`{{ $labels.alertmanager }}`}} receives invalid alerts and discards them. Check the Alertmanagers log for details.'
        summary: Alertmanager receives invalid alerts.

    - alert: AlertmanagerClusterHealthDegraded
      expr: alertmanager_cluster_health_score{alertmanager="{{ include "kube-prometheus-stack.name" . }}"} != 0
      for: 15m
      labels:
        severity: info
        {{- if or .Values.alerts.defaultRules.additionalRuleLabels }}
          {{- with .Values.alerts.defaultRules.additionalRuleLabels }}
            {{- toYaml . | nindent 6 }}
          {{- end }}
        {{- end }}
      annotations:
        description: 'Alertmanager {{`{{ $labels.alertmanager }}`}} cluster has problems. Check AM logs.'
        summary: Alertmanager cluster health degraded.

    - alert: AlertmanagerPeerReconnectFailed
      expr: rate(alertmanager_cluster_reconnections_failed_total{alertmanager="{{ include "kube-prometheus-stack.name" . }}"}[5m]) != 0
      for: 15m
      labels:
        severity: info
        {{- if or .Values.alerts.defaultRules.additionalRuleLabels }}
          {{- with .Values.alerts.defaultRules.additionalRuleLabels }}
            {{- toYaml . | nindent 6 }}
          {{- end }}
        {{- end }}
      annotations:
        description: 'Alertmanager {{`{{ $labels.alertmanager }}`}} failed to reconnect to its peer. Check AM logs.'
        summary: Alertmanager failed to reconnect to peer.
{{- end }}