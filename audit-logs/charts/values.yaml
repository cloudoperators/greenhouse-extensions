# -- Common labels to apply to all resources
commonLabels:

# -- Global values shared with subcharts (audit-poller)
global:
  # -- Prometheus label selector for PodMonitor/PrometheusRule resources
  prometheus: ""
  # -- Region identifier
  region: ""
  # -- Cluster type identifier
  clusterType: ""
  # -- Cluster name (defaults to region if empty)
  cluster: ""
# -- Extra Kubernetes manifests to include in the Helm release. Each entry is rendered as-is (map) or with `tpl` (string). Useful for ConfigMaps that satisfy cluster admission policies.
extraManifests: []

auditLogs:

  nodeSelector: {}

  # -- Node affinity rules for the collector DaemonSet pods
  affinity: {}

  # -- Annotations to add to collector pods
  podAnnotations: {}

  # -- Grace period for pod termination in seconds
  terminationGracePeriodSeconds: 30

  collectorImage:
    # -- overrides the default image repository for the OpenTelemetry Collector image.
    repository: ghcr.io/cloudoperators/opentelemetry-collector-contrib
    # -- overrides the default image tag for the OpenTelemetry Collector image.
    tag: "a8981ba"

  # -- Custom labels to apply to all OpenTelemetry related resources
  customLabels:
  # -- Cluster label for Logging
  cluster:
  # -- Region label for Logging
  region:
  logsCollector:
    # -- Activates the standard configuration for Logs.
    enabled: true
    auditd:
      # -- Activates the ingestion of auditd logs.
      enabled: true
    auditpoller:
      # -- Activates the receiver for ingesting audit-poller logs
      enabled: false
    kubeApiAudit:
      # -- Activates export for kube-apiserver audit logs
      enabled: false
    containerd:
      # -- Activates ingestion of container stdout/stderr logs from /var/log/pods
      enabled: false
    journald:
        # -- Activates ingestion of systemd journal logs
      enabled: false
    # -- Kafka exporter configuration for buffering audit logs
    kafka:
      # -- Enable Kafka exporter for audit logs buffering. When enabled, audit logs are exported to Kafka instead of OpenSearch.
      enabled: false
      # -- Kafka broker addresses (e.g., ["kafka-bootstrap.kafka.svc.cluster.local:9092"])
      brokers: []
      # -- Kafka topic name for audit logs
      topic: ""
      # -- Kafka protocol version (e.g., "3.9.0")
      protocol_version: ""
      # -- Message encoding format (otlp_json, otlp_proto, raw, opensearch_log_encoding)
      encoding: ""
      # -- Compression type (none, gzip, snappy, lz4, zstd)
      compression: ""
      # -- TLS settings for the Kafka exporter. Enable when the broker terminates TLS.
      tls:
        # -- Enable TLS on the connection to Kafka.
        enabled: false
        # -- Skip server certificate verification. Leave false for production.
        insecure_skip_verify: false
  openSearchLogs:
    # -- Endpoint URL for OpenSearch
    endpoint:
    # -- Name for OpenSearch index
    index:
    # -- Timeout for OpenSearch requests
    timeout: 30s
    # -- Username for OpenSearch endpoint
    failover_username_a:
    # -- Password for OpenSearch endpoint
    failover_password_a:
    # -- Second Username (as a failover) for OpenSearch endpoint
    failover_username_b:
    # -- Second Password (as a failover) for OpenSearch endpoint
    failover_password_b:
  elastic:
    # -- Activates the configuration for Elastic.
    enabled: false
    # -- Endpoint URL for Elastic
    endpoint:
    # -- TLS certificate for Elastic
    tls:
      crt:
      key:
    # -- Labels to be added to Elastic logs
    labels: []

  # -- Kafka -> OpenSearch ingest collectors for audit logs. One Deployment per entry.
  # @default -- see values.yaml
  ingesterCollector:
    # -- Enable the ingest collectors block.
    enabled: false
    # -- Replica count per ingest collector Deployment.
    replicas: 1
    image:
      # -- Image repository override; falls back to auditLogs.collectorImage.repository.
      repository: ""
      # -- Image tag override; falls back to auditLogs.collectorImage.tag.
      tag: ""
    # -- Pod resources per ingest collector Deployment.
    resources: {}
    prometheus:
      podMonitor:
        # -- Render a PodMonitor per enabled ingest collector.
        enabled: true
    # Entry shape:
    #   <name>:
    #     enabled: bool                         # render this collector
    #     topic: <kafka-topic>                  # single Kafka topic consumed by this collector
    #     initialOffset: latest | earliest      # optional, defaults to latest
    #     extraProcessors: <list>               # optional, ordered list of {name, config} entries; each is added to processors: and appended to the pipeline in this order
    #     kafka: { brokers, protocol_version, encoding }  # optional override of auditLogs.logsCollector.kafka
    #     opensearch:
    #       endpoint: <url>
    #       tls: { caSecret, caSecretKey, insecure }
    #       mapping: { mode: bodymap }          # optional, opensearchexporter mapping block (e.g. bodymap to write the parsed body as the document root)
    #       failover_username_a / failover_password_a / failover_username_b / failover_password_b
    # Each entry renders one OpenTelemetryCollector named "audit-ingester-<name>" with
    # group_id "audit-ingester-<name>" and indexes documents into OpenSearch index "<name>".
    # -- Map of ingest collectors keyed by name. Configured via PluginPreset.
    collectors: {}


  prometheus:
    # -- Activates the service-monitoring for the Logs Collector.
    podMonitor:
      enabled: false
    # -- Activates the pod-monitoring for the Logs Collector.
    serviceMonitor:
      enabled: false

    # -- Label selectors for the Prometheus resources to be picked up by prometheus-operator.
    additionalLabels: {}
    # plugin: kube-monitoring
    # prometheus: infra

    # -- Default rules for monitoring the opentelemetry components.
    rules:
      # -- Enables PrometheusRule resources to be created.
      create: true

      # -- Labels for PrometheusRules.
      labels: {}

      ## This is useful for adding additional labels such as "support_group" or "service" for the routing of alerts to each rule
      # -- Additional labels for PrometheusRule alerts.
      additionalRuleLabels:
        # support_group: support
        # service: my-service

auditPoller:
  # -- Enables the audit-poller deployment for polling IAS audit logs
  enabled: false
  image:
    # -- Image repository for the audit-poller
    repository: ""
    # -- Image tag for the audit-poller
    tag: ""
  logLevel: "info"
  logDir: "/audit-poller"
  metricsPort: 9298
  iasApi:
    fileName: "ias_api.log"
    interval: 5
    user:
    password:
    tokenURL:
    apiURL:
    alternateApiURL:
    syncFrom:
  iasChangelog:
    fileName: "ias_changelog.log"
    interval: 30
    user:
    password:
    url:
    syncFrom:
  persistence:
    enabled: false
  playbook:
    # -- Base path for alert playbook URLs (anchor fragment is appended per alert)
    basePath: "docs/support/playbook/audit-poller"
