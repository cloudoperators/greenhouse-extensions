apiVersion: greenhouse.sap/v1alpha1
kind: PluginDefinition
metadata:
    name: audit-logs
spec:
    version: 0.1.3
    displayName: OpenTelemetry for Audit Logs
    description: Audit Logs relevant Observability framework for instrumenting, generating, collecting, and exporting telemetry data such as traces, metrics, and logs.
    icon: https://raw.githubusercontent.com/cloudoperators/greenhouse-extensions/main/audit-logs/logo.png
    helmChart:
        name: 'audit-logs'
        repository: oci://ghcr.io/cloudoperators/greenhouse-extensions/charts
        version: 0.1.3
    options:
        - name: auditLogs.region
          description: Region label for logging
          required: false
          type: string
        - name: auditLogs.cluster
          description: Cluster label for logging
          required: false
          type: string
        - name: auditLogs.nodeSelector
          description: Node selector for the collector pods
          required: false
          type: map
        - name: auditLogs.openSearchLogs.endpoint
          description: Endpoint URL for OpenSearch
          required: false
          type: string
        - name: auditLogs.openSearchLogs.index
          description: auditLogs.openSearchLogs.index
          required: false
          type: string
        - name: auditLogs.openSearchLogs.failover_username_a
          description: Username for OpenSearch endpoint
          required: false
          type: secret
        - name: auditLogs.openSearchLogs.failover_password_a
          description: Password for OpenSearch endpoint
          required: false
          type: secret
        - name: auditLogs.openSearchLogs.failover.enabled
          default: false
          description: Activates the a failover mechanism for a second user (in case the first user is invalidated)
          required: false
          type: bool
        - name: auditLogs.openSearchLogs.failover_username_b
          description: Second Username (as a failover) for OpenSearch endpoint
          required: false
          type: secret
        - name: auditLogs.openSearchLogs.failover_password_b
          description: Second Username (as a failover) for OpenSearch endpoint
          required: false
          type: secret  
        - name: auditLogs.prometheus.podMonitor.enabled
          default: false
          description: auditLogs.prometheus.podMonitor.enabled
          required: false
          type: bool
        - name: auditLogs.prometheus.serviceMonitor.enabled
          default: false
          description: auditLogs.prometheus.serviceMonitor.enabled
          required: false
          type: bool
        - name: auditLogs.prometheus.rules.create
          description: auditLogs.prometheus.rules.create
          required: false
          type: bool
        - name: auditLogs.prometheus.additionalLabels
          description: Label selector for Prometheus resources to be picked-up by the operator
          required: false
          type: map
        - name: auditLogs.prometheus.rules.additionalRuleLabels
          description: Additional labels for PrometheusRule alerts
          required: false
          type: map
        - name: auditLogs.collectorImage.repository
          default: ghcr.io/cloudoperators/opentelemetry-collector-contrib
          description: Collector image repository
          required: false
          type: string
        - name: auditLogs.collectorImage.tag
          default: "a8981ba"
          description: Collector image tag
          required: false
          type: string
        - name: auditLogs.logsCollector.enabled
          default: true
          description: Top-level toggle for the producer-side audit logs collector. Set to false in consumer-only PluginPresets to skip rendering the producer DaemonSet.
          required: false
          type: bool
        - name: auditLogs.logsCollector.auditd.enabled
          description: Enable auditd ingestion
          required: false
          type: bool
        - name: auditLogs.logsCollector.kubeApiAudit.enabled
          default: false
          description: Enable k8s kube-apiserver audit logs ingestion
          required: false
          type: bool
        - name: auditLogs.logsCollector.containerd.enabled
          default: false
          description: Enable container logs (stdout/stderr) ingestion
          required: false
          type: bool
        - name: auditLogs.logsCollector.journald.enabled
          default: false
          description: Enable systemd journal logs ingestion
          required: false
          type: bool
        - name: auditLogs.logsCollector.kafka.enabled
          default: false
          description: Enable Kafka exporter for audit logs buffering. When enabled, audit logs are exported to Kafka instead of OpenSearch.
          required: false
          type: bool
        - name: auditLogs.logsCollector.kafka.brokers
          description: Kafka broker addresses
          required: false
          type: list
        - name: auditLogs.logsCollector.kafka.topic
          description: Kafka topic name for audit logs
          required: false
          type: string
        - name: auditLogs.logsCollector.kafka.protocol_version
          description: Kafka protocol version (e.g. "3.9.0")
          required: false
          type: string
        - name: auditLogs.logsCollector.kafka.encoding
          description: Message encoding format (otlp_json, otlp_proto, raw, opensearch_log_encoding)
          required: false
          type: string
        - name: auditLogs.logsCollector.kafka.compression
          description: Compression type (none, gzip, snappy, lz4, zstd)
          required: false
          type: string
        - name: auditLogs.logsCollector.kafka.tls.enabled
          default: false
          description: Enable TLS on the connection to Kafka
          required: false
          type: bool
        - name: auditLogs.logsCollector.kafka.tls.insecure_skip_verify
          default: false
          description: Skip server certificate verification (leave false for production)
          required: false
          type: bool
        - name: auditLogs.ingesterCollector.enabled
          default: false
          description: Top-level toggle for the Kafka -> OpenSearch audit ingest collectors
          required: false
          type: bool
        - name: auditLogs.ingesterCollector.replicas
          default: 1
          description: Replica count per ingest collector Deployment
          required: false
          type: int
        - name: auditLogs.ingesterCollector.resources
          description: Pod resources per ingest collector Deployment
          required: false
          type: map
        - name: auditLogs.ingesterCollector.prometheus.podMonitor.enabled
          default: true
          description: Render a PodMonitor per enabled ingest collector
          required: false
          type: bool
        - name: auditLogs.ingesterCollector.collectors
          description: Map of ingest collectors keyed by name. Each entry renders one OpenTelemetryCollector named `audit-ingester-<name>` consuming a single Kafka topic and writing to OpenSearch index `<name>`. See chart values.yaml for the entry schema.
          required: false
          type: map
        - name: extraManifests
          description: Extra Kubernetes manifests to include in the Helm release. Useful for ConfigMaps that satisfy cluster admission policies.
          required: false
          type: list
