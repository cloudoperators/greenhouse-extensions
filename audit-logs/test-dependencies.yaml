dependencies:
  - logs

values:
  opentelemetry-operator:
    enabled: true
    crds:
      create: false
    admissionWebhooks:
      create: true
      failurePolicy: 'Ignore'
      certManager:
        enabled: false
      autoGenerateCert:
        enabled: true
        recreate: false
    manager:
      prometheusRule:
        enabled: false
        defaultRules:
          enabled: false
      serviceMonitor:
        enabled: false
    kubeRBACProxy:
      enabled: false

  customCRDs:
    enabled: true

  openTelemetry:
    openSearchLogs:
      endpoint: test
      failover_username_a: test
      failover_password_a: test
      failover_username_b: test
      failover_password_b: test
      index: test
    cluster: test
    region: test
    logsCollector:
      enabled: true
    metricsCollector:
      enabled: false
