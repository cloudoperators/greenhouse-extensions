          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_test
        annotations:
          summary: '🔴 WAFL Inconsistent on {{ "{{ $labels.name }}" }}'
          description: >
            'An inconsistency in WAFL (Write Anywhere File Layout) was detected on node 
            {{ "{{ $labels.name }}" }} (Cluster: {{ "{{ $labels.netapp_cluster }}" }}). 
            This requires immediate attention. The alert resolves when the event 
            "callhome.wafl.iron.done" is detected.'


