{{- if ne (.Values.prometheusRules.ruleGroups.netappTestAlerts | toString) "false" }}
groups:
  - name: monitor_raidtec_dblDegraded_final
    interval: 1m
    rules:
      - record: monitor_raidtec_dblDegraded_trigger
        expr: |
          max by (netapp_cluster, node, datacenter, cluster_uuid, rgname) (
            max_over_time(ems_events{message="monitor.raidtec.dblDegraded"}[2m])
          )
      - record: monitor_raid_reconstruct_trigger
        expr: |
          max by (netapp_cluster, node, datacenter, cluster_uuid, rgname) (
            max_over_time(ems_events{message="monitor.raid.reconstruct"}[2m])
          )
      - record: monitor_raidtec_dblDegraded_persistent
        expr: |
          (
            monitor_raidtec_dblDegraded_trigger
            or
            monitor_raidtec_dblDegraded_persistent
          )
          unless
          monitor_raid_reconstruct_trigger

  - name: monitor_raidtec_dblDegraded_alerts
    rules:
      - alert: MonitorRaidtecDblDegraded
        expr: monitor_raidtec_dblDegraded_persistent == 1
        for: 2m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_test
        annotations:
          summary: '🔴 RAID Double Degraded on {{ "{{ $labels.node }}" }}'
          description: > 
            'RAID Group {{ "{{ $labels.rgname }}" }} on node {{ "{{ $labels.node }}" }} 
            (Cluster: {{ "{{ $labels.netapp_cluster }}" }}) is double degraded. 
            This indicates a critical failure risk. The alert resolves when the event 
            "monitor.raid.reconstruct" is detected.'


