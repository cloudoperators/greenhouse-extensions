            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: CertExpired
        expr: last_over_time(ems_events{message="mgmtgwd.certificate.expired"}[5m]) == 1
