        labels:
          severity: warning
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'License is expiring'
          description: 'License {{ "{{ $labels.package }}" }} is expiring. Expiration date: {{ "{{ $labels.expiration }}" }} |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: NFSListenersFailure
        expr: last_over_time(ems_events{message="mgmt.nfslisteners.failure"}[5m]) == 1
        for: 5m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'NFS listeners failure'
          description: 'NFS listener failure detected. Reason: {{ "{{ $labels.reason }}" }} |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: SnapMirrorCatchupFail
        expr: last_over_time(ems_events{message="mgmt.snapmir.ls.catchup.fail"}[5m]) == 1
        for: 5m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'SnapMirror catchup failure'
          description: 'SnapMirror catchup failure for source {{ "{{ $labels.srcpath }}" }} to destination {{ "{{ $labels.dstpath }}" }}. Error: {{ "{{ $labels.error }}" }} (Job ID: {{ "{{ $labels.jobID }}" }}) |
