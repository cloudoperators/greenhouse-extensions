          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'Certificate expired'
          description: 'Certificate {{ "{{ $labels.common_name }}" }} (Serial: {{ "{{ $labels.serial_number }}" }}) issued by {{ "{{ $labels.certificate_authority }}" }} of type {{ "{{ $labels.type }}" }} for vServer {{ "{{ $labels.vserver }}" }} has expired |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: CertExpiring
        expr: last_over_time(ems_events{message="mgmtgwd.certificate.expiring"}[5m]) == 1
        for: 5m
        labels:
          severity: warning
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'Certificate expiring'
          description: 'Certificate {{ "{{ $labels.common_name }}" }} (Serial: {{ "{{ $labels.serial_number }}" }}) issued by {{ "{{ $labels.certificate_authority }}" }} of type {{ "{{ $labels.type }}" }} for vServer {{ "{{ $labels.vserver }}" }} is expiring in {{ "{{ $labels.days }}" }} days |
