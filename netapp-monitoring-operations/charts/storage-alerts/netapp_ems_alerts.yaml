          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'Hardware assist notify config failed'
          description: 'Hardware assist notify config failed for {{ "{{ $labels.hwtype }}" }} due to error {{ "{{ $labels.errorstr }}" }} (Code: {{ "{{ $labels.error }}" }}) |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: TakeoverDisabled
        expr: last_over_time(ems_events{message="cf.takeover.disabled"}[5m]) == 1
        for: 5m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'Takeover disabled'
          description: 'Takeover is disabled. Reason: {{ "{{ $labels.reason }}" }} |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: NodeOutOfQuorum
        expr: last_over_time(ems_events{message="clam.node.ooq"}[5m]) == 1
        for: 5m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
