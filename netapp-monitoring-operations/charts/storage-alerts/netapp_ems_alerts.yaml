{{- if ne (.Values.prometheusRules.ruleGroups.netappEmsAlerts | toString) "false" }}
groups:
  - name: netapp_ems_alerts
    rules:
      - alert: LUNVolNoSpace
        expr: last_over_time(ems_events{message="LUN.vol.no.space"}[1m]) == 1
        for: 5m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'LUN volume has no space'
          description: 'LUN {{ "{{ $labels.lun_path }}" }} in volume {{ "{{ $labels.volume }}" }} is out of space |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }} |
            Volume DS ID: {{ "{{ $labels.volume_ds_id }}" }}'
      - alert: NbladeNfsV4PoolExhaust
        expr: last_over_time(ems_events{message="Nblade.nfsV4PoolExhaust"}[5m]) == 1
        for: 5m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'NFSv4 Pool Exhaustion'
          description: 'Pool {{ "{{ $labels.poolname }}" }} of type {{ "{{ $labels.object_type }}" }} is exhausted. |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: DiskInventoryMismatch
        expr: last_over_time(ems_events{message="cf.disk.inventory.mismatch"}[5m]) == 1
        for: 5m
        labels:
          severity: warning
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'Disk inventory mismatch detected'
          description: 'Disk inventory mismatch for disk {{ "{{ $labels.disk }}" }} on host {{ "{{ $labels.host }}" }} |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }} |
            Object UID: {{ "{{ $labels.object_uid }}" }}'
      - alert: TakeoverFailed
        expr: last_over_time(ems_events{message="cf.fm.takeoverFailed"}[5m]) == 1
        for: 5m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'Takeover operation failed'
          description: 'Takeover operation failed due to reason {{ "{{ $labels.reason }}" }} |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }} |
            Partner Node UID: {{ "{{ $labels.partner_node_uuid }}" }} |
            Token: {{ "{{ $labels.token }}" }}'
      - alert: VersionMismatch
        expr: last_over_time(ems_events{message="cf.fm.versionMismatch"}[5m]) == 1
        for: 5m
        labels:
          severity: warning
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'Version mismatch between subsystems'
          description: 'Subsystem {{ "{{ $labels.subsystem }}" }} version mismatch. Local version: {{ "{{ $labels.version }}" }}, partner version: {{ "{{ $labels.partner_version }}" }} |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: TakeoverNoHeartbeat
        expr: last_over_time(ems_events{message="cf.fsm.takeover.noHeartbeat"}[5m]) == 1
        for: 5m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'No heartbeat detected for takeover'
          description: 'No heartbeat detected for takeover process |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: TakeoverByPartnerDisabled
        expr: last_over_time(ems_events{message="cf.fsm.takeoverByPartnerDisabled"}[5m]) == 1
        for: 5m
        labels:
          severity: warning
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'Takeover by partner is disabled'
          description: 'Takeover by partner is disabled. Reason: {{ "{{ $labels.reason }}" }} |
            Local: {{ "{{ $labels.local }}" }} |
            Partner: {{ "{{ $labels.partner }}" }} |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: TakeoverHung
        expr: last_over_time(ems_events{message="cf.fsm.takeoverHung"}[5m]) == 1
        for: 5m
        labels:
          severity: critical
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'Takeover process hung'
          description: 'Takeover process is hung in module {{ "{{ $labels.moduleName }}" }} |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: NotifyCfgFailed
        expr: last_over_time(ems_events{message="cf.hwassist.notifyCfgFailed"}[5m]) == 1
