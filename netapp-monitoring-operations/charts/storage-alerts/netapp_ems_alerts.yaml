            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
      - alert: DrivePhyDisableError
        expr: last_over_time(ems_events{message="ds.sas.drivephy.disableErr"}[5m]) == 1
        for: 5m
        labels:
          severity: warning
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: netapp_ems
        annotations:
          summary: 'SAS drive PHY disable error'
          description: 'SAS drive PHY disable error detected. Drive: {{ "{{ $labels.disk_data }}" }}, Reason: {{ "{{ $labels.reason }}" }} |
            Shelf ID: {{ "{{ $labels.shelfID }}" }} |
            Bay: {{ "{{ $labels.bay }}" }} |
            Channels: {{ "{{ $labels.channels }}" }} |
            Element: {{ "{{ $labels.element }}" }} |
            PHY: {{ "{{ $labels.phy }}" }} |
            Cluster: {{ "{{ $labels.cluster }}" }} |
            NetApp Cluster: {{ "{{ $labels.netapp_cluster }}" }} |
            Node: {{ "{{ $labels.node }}" }} |
            Datacenter: {{ "{{ $labels.datacenter }}" }} |
            LOB: {{ "{{ $labels.lob }}" }} |
            Service: {{ "{{ $labels.Service }}" }}'
