{{- $anyEnabled := or (ne (.Values.prometheusRules.ruleGroups.powerscaleErrorPreprocessing | toString) "false") (ne (.Values.prometheusRules.ruleGroups.powerscaleErrorAlerts | toString) "false") }}
{{- if not $anyEnabled }}
groups: []
{{- else }}
groups:
{{- if ne (.Values.prometheusRules.ruleGroups.powerscaleErrorPreprocessing | toString) "false" }}
  - name: powerscale_error_preprocessing
    rules:
      - record: powerscale_error_log_total:filtered
        expr: |
          powerscale_error_log_total
          unless (
            powerscale_error_log_total{messageid="900180001"}
            or (powerscale_error_log_total{messageid="400200001", messagetext=~".*SyncIQ.*"})
            or (powerscale_error_log_total{messageid="400090006", messagetext=~"SupportAssist.*"})
            or (powerscale_error_log_total{messageid="400070007", messagetext=~"License.*"})
          )

{{- end }}
{{- if ne (.Values.prometheusRules.ruleGroups.powerscaleErrorAlerts | toString) "false" }}
  - name: powerscale_error_alerts
    rules:
{{- if not (index .Values.prometheusRules.disabled "PowerscaleError_New" | default false) }}
      - alert: PowerscaleError_New
        expr: |
          sum by (messageid, messagetext, cluster, source)(
            powerscale_error_log_total:filtered
          )
          unless
          sum by (messageid, messagetext, cluster, source)(
            powerscale_error_log_total:filtered offset 24h
          )
        for: 0m
        labels:
          severity: warning
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: powerscale
        annotations:
          summary: "New powerscale error MessageID: ({{`{{ $labels.messageid }}`}})"
          description: |
            Message: {{`{{ $labels.messagetext }}`}}
            Source: {{`{{ $labels.source }}`}}

{{- end }}
{{- if not (index .Values.prometheusRules.disabled "PowerScaleError_LessFrequent" | default false) }}
      - alert: PowerScaleError_LessFrequent
        expr: |
          sum by (messageid, messagetext, cluster, source)(
            increase(powerscale_error_log_total:filtered[24h])
          ) > 0
          and
          sum by (messageid, messagetext, cluster, source)(
            increase(powerscale_error_log_total:filtered[24h])
          ) <= 50
        for: 0m
        labels:
          severity: warning
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: powerscale
        annotations:
          summary: "PowerScale error MessageID: ({{`{{ $labels.messageid }}`}})"
          description: |
            Message: {{`{{ $labels.messagetext }}`}}
            Source: {{`{{ $labels.source }}`}}

{{- end }}
{{- if not (index .Values.prometheusRules.disabled "PowerScaleError_MoreFrequent" | default false) }}
      - alert: PowerScaleError_MoreFrequent
        expr: |
          sum by (messageid, messagetext, cluster, source)(
            increase(powerscale_error_log_total:filtered[24h])
          ) > 50
        for: 0m
        labels:
          severity: warning
          support_group: {{ dig "support_group" "storage" (.Values.prometheusRules.commonLabels | default dict) }}
          team: {{ dig "team" "dme-storage" (.Values.prometheusRules.commonLabels | default dict) }}
          component: powerscale
        annotations:
          summary: "PowerScale error MessageID: ({{`{{ $labels.messageid }}`}})"
          description: |
            Message: {{`{{ $labels.messagetext }}`}}
            Source: {{`{{ $labels.source }}`}}

{{- end }}
{{- end }}
{{- end }}
