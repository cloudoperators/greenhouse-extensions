prometheusRules:
  create: true
  # Labels applied to every PrometheusRule's metadata. `plugin` must match the
  # Prometheus ruleSelector so the rules are picked up; add any extra labels here.
  labels:
    plugin: storage-metrics-product
  # Enable/disable an entire rule group. Keys are the camelCase form of the group
  # `name` (e.g. group "brocade_error_alerts" -> brocadeErrorAlerts). Every group
  # is listed here and enabled by default; set a key to false to drop that group.
  ruleGroups:
    # brocade-error-alerts.yaml (forge project, not in sci scope -> disabled by default)
    brocadeErrorPreprocessing: false
    brocadeErrorAlerts: false
    # harvest-poller-alerts.yaml
    harvestNetappScrape: true
    # netapp_aggr_alerts.yaml
    netappAggrAlerts: true
    # netapp_cluster_alerts.yaml
    netappClusterAlerts: true
    # netapp_disk_alerts.yaml
    netappDiskAlerts: true
    # netapp_ems_alerts.yaml
    netappEmsAlerts: true
    # netapp_lun_alerts.yaml
    netappLunAlerts: true
    # netapp_network_alerts.yaml
    netappNetworkAlerts: true
    # netapp_nvdimm_alerts.yaml
    netappNvdimmAlerts: true
    # netapp_test_alerts.yaml
    monitorRaidtecDblDegradedFinal: true
    monitorRaidtecDblDegradedAlerts: true
    callhomeWaflInconsistentFinal: true
    callhomeWaflInconsistentAlerts: true
    monitorFanFailedFinal: true
    monitorFanFailedAlerts: true
    vifmgrCluscheckLifdownFinal: true
    vifmgrCluscheckLifdownAlerts: true
    monitorChassisPowerSupplyDegradedFinal: true
    monitorChassisPowerSupplyDegradedAlerts: true
    nvmemBatteryCapacityLowFinal: true
    nvmemBatteryCapacityLowAlerts: true
    nvramBatteryCapacityLowWarnFinal: true
    nvramBatteryCapacityLowWarnAlerts: true
    snapmirrorMigrateSrcErrFinal: true
    snapmirrorMigrateSrcErrAlerts: true
    snapmirrorMigrateDstErrFinal: true
    snapmirrorMigrateDstErrAlerts: true
    replicationDstResyncFailedFinal: true
    replicationDstResyncFailedAlerts: true
    upgrademgrUpdatePausedErrFinal: true
    upgrademgrUpdatePausedErrAlerts: true
    sesStatusCurrentErrorFinal: true
    sesStatusCurrentErrorAlerts: true
    sesStatusCurrentWarningFinal: true
    sesStatusCurrentWarningAlerts: true
    cfFsmTakeoverOfPartnerDisabledFinal: true
    cfFsmTakeoverOfPartnerDisabledAlerts: true
    cfFsmTakeoverByPartnerDisabledFinal: true
    cfFsmTakeoverByPartnerDisabledAlerts: true
    vifmgrPortdownFinal: true
    vifmgrPortdownAlerts: true
    waflSnapCreateSkipReasonFinal: true
    waflSnapCreateSkipReasonAlerts: true
    vifmgrLifsOvercapacityFinal: true
    vifmgrLifsOvercapacityAlerts: true
    raidConfigSpareDiskMissingFinal: true
    raidConfigSpareDiskMissingAlerts: true
    callhomeShlfFaultFinal: true
    callhomeShlfFaultAlerts: true
    clamPartnerHaltingFinal: true
    clamPartnerHaltingAlerts: true
    mgmtSnapmirResyncFailFinal: true
    mgmtSnapmirResyncFailAlerts: true
    monitorVolumeFullFinal: true
    monitorVolumeFullAlerts: true
    monitorVolumeNearlyFullFinal: true
    monitorVolumeNearlyFullAlerts: true
    vifmgrCluscheckHwerrorsFinal: true
    vifmgrCluscheckHwerrorsAlerts: true
    monitorNvramLowBatteriesFinal: true
    monitorNvramLowBatteriesAlerts: true
    monitorNvmembatteryWarninglowFinal: true
    monitorNvmembatteryWarninglowAlerts: true
    kmRunExternalSetupFinal: true
    kmRunExternalSetupAlerts: true
    kmKeyserverNotavailableFinal: true
    kmKeyserverNotavailableAlerts: true
    kmKeyretrieveFailedFinal: true
    kmKeyretrieveFailedAlerts: true
    callhomeRebootTakeoverFinal: true
    callhomeRebootTakeoverAlerts: true
    clamNodeOoqFinal: true
    clamNodeOoqAlerts: true
