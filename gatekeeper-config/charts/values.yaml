policies:
  highCpuRequests:
    enabled: true
    enforcementAction: dryrun
    maxCpu: 6

  unmanagedPods:
    enabled: true
    enforcementAction: dryrun
    allowedNamePatterns: []

  forbiddenClusterwideObjects:
    enabled: false
    enforcementAction: dryrun
    allowedWebhooks: []

  imagesFromApprovedRegistries:
    enabled: false
    enforcementAction: dryrun
    allowedRegistries: []

  pciForbiddenImages:
    enabled: false
    enforcementAction: dryrun
    patterns: []

  podRequiredLabels:
    enabled: false
    enforcementAction: dryrun
    requiredLabels: []

  podSecurityV2:
    enabled: false
    enforcementAction: dryrun
    allowlist: []

  ingressAnnotations:
    enabled: true
    enforcementAction: dryrun

  ingressAnnotationsMigration:
    enabled: false
    enforcementAction: dryrun

  prometheusScrapeAnnotations:
    enabled: false
    enforcementAction: dryrun

tests:
  enabled: false
