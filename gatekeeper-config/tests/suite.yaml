    object: fixtures/pod-security-v2/pod-host-network-violation.yaml
    assertions:
    - violations: 1
      message: '^\{"owned_by":"none"\} >> pod is not allowed to set spec\.hostNetwork = true$'
  - name: pod-host-network-allowlisted
    object: fixtures/pod-security-v2/pod-host-network-allowlisted.yaml
    assertions:
    - violations: 0
  - name: pod-host-network-allowlisted-registry-port
    object: fixtures/pod-security-v2/pod-host-network-allowlisted-registry-port.yaml
    assertions:
    - violations: 0
  - name: pod-privileged-violation
    object: fixtures/pod-security-v2/pod-privileged-violation.yaml
    assertions:
    - violations: 1
      message: '^\{"owned_by":"none"\} >> pod is not allowed to set spec\.containers\["app"\]\.securityContext\.privileged = true \(image = "alpine"\)$'
  - name: pod-readonly-machine-id-pass
    object: fixtures/pod-security-v2/pod-readonly-machine-id-pass.yaml
    assertions:
    - violations: 0
  - name: pod-capability-violation
    object: fixtures/pod-security-v2/pod-capability-violation.yaml
