    assertions:
    - violations: 1
      message: '^\{"owned_by":"none"\} >> has prometheus\.io/scrape annotation, but prometheus\.io/targets annotation is missing or does not have a valid value \(got: \[""\], valid: \[\]\)$'
  - name: pod-scrape-false
    object: fixtures/prometheus-scrape-annotations/pod-scrape-false.yaml
    assertions:
    - violations: 0
  - name: service-scrape-true-no-targets
    object: fixtures/prometheus-scrape-annotations/service-scrape-true-no-targets.yaml
    assertions:
    - violations: 1
      message: '^\{"owned_by":"none"\} >> has prometheus\.io/scrape annotation, but prometheus\.io/targets annotation is missing or does not have a valid value \(got: \[""\], valid: \[\]\)$'
