apiVersion: greenhouse.sap/v1alpha1
kind: PluginDefinition
metadata:
  name: logs
spec:
  version: 0.15.0
  displayName: Logs
  description: Observability framework for instrumenting, generating, collecting, and exporting logs.
  icon: https://raw.githubusercontent.com/cloudoperators/greenhouse-extensions/main/logs/logo.png
  helmChart:
    name: logs
    repository: oci://ghcr.io/cloudoperators/greenhouse-extensions/charts
    version: 0.4.0
  options:
    - default: true
      description: Set to true to enable the installation of the OpenTelemetry Operator.
      name: opentelemetry-operator.enabled
      required: false
      type: bool
    - default: true
      description: Set this to true to create the custom CRDs required by the OpenTelemetry Operator. Set to false if another chart is already installing the CRDs.
      name: customCRDs.enabled
      required: false
      type: bool
    - default: true
      description: Activates the standard configuration for logs
      name: openTelemetry.logsCollector.enabled
      required: false
      type: bool
    - default: false
      description: Activates the configuration for KVM logs (requires logsCollector enabled)
      name: openTelemetry.logsCollector.kvmConfig.enabled
      required: false
      type: bool
    - default: false
      description: Activates the configuration for Ceph logs (requires logsCollector enabled)
      name: openTelemetry.logsCollector.cephConfig.enabled
      required: false
      type: bool
    - default: false
      description: Activates the configuration for OpenStack logs (requires logsCollector enabled)
      name: openTelemetry.logsCollector.openstackConfig.enabled
      required: false
      type: bool
    - default: false
      description: Enables the standalone external OTel Collector StatefulSet for syslog, traces, and external event ingestion
      name: openTelemetry.externalCollector.enabled
      required: false
      type: bool
    - default: false
      description: Enables Kafka exporter (replaces OpenSearch failover with Kafka buffering)
      name: openTelemetry.kafka.enabled
      required: false
      type: bool
    - default: false
      description: Activates the configuration for receiving external alertmanager webhooks and deployment events (standalone collector)
      name: openTelemetry.externalCollector.externalConfig.enabled
      required: false
      type: bool
    - default: false
      description: Activates syslog TCP/UDP ingestion on the standalone external collector
      name: openTelemetry.externalCollector.syslogConfig.enabled
      required: false
      type: bool
    - default: false
      description: Activates syslog TCP with TLS ingestion on the standalone external collector
      name: openTelemetry.externalCollector.syslogTLSConfig.enabled
      required: false
      type: bool
    - default: false
      description: Activates OTLP traces ingestion (gRPC and HTTP) on the standalone external collector
      name: openTelemetry.externalCollector.tracesConfig.enabled
      required: false
      type: bool
    - default: false
      description: Top-level toggle for the Kafka -> OpenSearch ingest collector
      name: openTelemetry.ingesterCollector.enabled
      required: false
      type: bool
    - default: 1
      description: Replica count for the ingest collector Deployment
      name: openTelemetry.ingesterCollector.replicas
      required: false
      type: int
    - description: Pod resources for the ingest collector
      name: openTelemetry.ingesterCollector.resources
      required: false
      type: map
    - default: true
      description: Render a PodMonitor for the ingest collector
      name: openTelemetry.ingesterCollector.prometheus.podMonitor.enabled
      required: false
      type: bool
    - description: OpenSearch endpoint for the ingest collector
      name: openTelemetry.ingesterCollector.opensearch.endpoint
      required: false
      type: string
    - description: Secret holding the OpenSearch CA for the ingester
      name: openTelemetry.ingesterCollector.opensearch.tls.caSecret
      required: false
      type: string
    - default: ca.crt
      description: Key in the CA secret for the OpenSearch CA file
      name: openTelemetry.ingesterCollector.opensearch.tls.caSecretKey
      required: false
      type: string
    - default: false
      description: Skip OpenSearch TLS verification
      name: openTelemetry.ingesterCollector.opensearch.tls.insecure
      required: false
      type: bool
    - description: First failover OpenSearch username for the ingester
      name: openTelemetry.ingesterCollector.opensearch.failover_username_a
      required: false
      type: secret
    - description: First failover OpenSearch password for the ingester
      name: openTelemetry.ingesterCollector.opensearch.failover_password_a
      required: false
      type: secret
    - description: Second failover OpenSearch username for the ingester
      name: openTelemetry.ingesterCollector.opensearch.failover_username_b
      required: false
      type: secret
    - description: Second failover OpenSearch password for the ingester
      name: openTelemetry.ingesterCollector.opensearch.failover_password_b
      required: false
      type: secret
    - description: Kafka broker override for the ingester. Falls back to openTelemetry.kafka.brokers.
      name: openTelemetry.ingesterCollector.kafka.brokers
      required: false
      type: list
    - description: Kafka protocol version override for the ingester
      name: openTelemetry.ingesterCollector.kafka.protocol_version
      required: false
      type: string
    - description: Kafka encoding override for the ingester
      name: openTelemetry.ingesterCollector.kafka.encoding
      required: false
      type: string
    - description: Map of streams keyed by name. Each entry renders one Kafka receiver + failover pipeline.
      name: openTelemetry.ingesterCollector.streams
      required: false
      type: map
    - default: true
      description: Activates the standard configuration for metrics
      name: openTelemetry.metricsCollector.enabled
      required: false
      type: bool
    - description: Username for OpenSearch endpoint
      name: openTelemetry.openSearchLogs.failover_username_a
      required: false
      type: secret
    - description: Password for OpenSearch endpoint
      name: openTelemetry.openSearchLogs.failover_password_a
      required: false
      type: secret
    - description: Second Username (as a failover) for OpenSearch endpoint
      name: openTelemetry.openSearchLogs.failover_username_b
      required: false
      type: secret
    - description: Second Password (as a failover) for OpenSearch endpoint
      name: openTelemetry.openSearchLogs.failover_password_b
      required: false
      type: secret
    - description: Endpoint URL for OpenSearch
      name: openTelemetry.openSearchLogs.endpoint
      required: false
      type: string
    - description: Region label for logging
      name: openTelemetry.region
      required: false
      type: string
    - description: Cluster label for logging
      name: openTelemetry.cluster
      required: false
      type: string
    - default: false
      description: Activates the pod-monitoring for the Logs Collector
      name: openTelemetry.prometheus.podMonitor.enabled
      required: false
      type: bool
    - default: false
      description: Activates the service-monitoring for the Logs Collector
      name: openTelemetry.prometheus.serviceMonitor.enabled
      required: false
      type: bool
    - description: Label selector for Prometheus resources to be picked-up by the operator
      name: openTelemetry.prometheus.additionalLabels
      required: false
      type: map
    - description: openTelemetry.prometheus.rules.enabled
      name: openTelemetry.prometheus.rules.enabled
      required: false
      type: map
    - default: true
      description: Activate to use the CertManager for generating self-signed certificates
      name: opentelemetry-operator.admissionWebhooks.certManager.enabled
      required: false
      type: bool
    - description: Additional labels for PrometheusRule alerts
      name: openTelemetry.prometheus.rules.additionalRuleLabels
      required: false
      type: map
    - default: false
      description: Activate to use Helm to create self-signed certificates
      name: opentelemetry-operator.admissionWebhooks.autoGenerateCert.enabled
      required: false
      type: bool
    - default: ghcr.io/cloudoperators/opentelemetry-collector-contrib
      description: openTelemetry.collectorImage.repository
      name: openTelemetry.collectorImage.repository
      required: false
      type: string
