{{- if .Values.openTelemetry.ingestCollector.enabled -}}
{{- $root := . -}}
{{- range $name, $cfg := .Values.openTelemetry.ingestCollector.collectors -}}
{{- if and $cfg.enabled (gt (len (default (dict) $cfg.streams)) 0) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: ingest-{{ $name }}-auth
  labels:
  {{- include "plugin.labels" $root | nindent 4 }}
  {{- if $root.Values.openTelemetry.customLabels }}
  {{ toYaml $root.Values.openTelemetry.customLabels | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  failover_username_a: {{ $cfg.opensearch.failover_username_a | quote }}
  failover_password_a: {{ $cfg.opensearch.failover_password_a | quote }}
  failover_username_b: {{ $cfg.opensearch.failover_username_b | quote }}
  failover_password_b: {{ $cfg.opensearch.failover_password_b | quote }}
{{- end }}
{{- end }}
{{- end }}
