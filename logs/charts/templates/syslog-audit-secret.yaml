{{- if and .Values.openTelemetry.externalCollector.enabled (or .Values.openTelemetry.externalCollector.syslogConfig.enabled .Values.openTelemetry.externalCollector.syslogTLSConfig.enabled) (not .Values.openTelemetry.kafka.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: otel-syslog-audit-auth
  labels:
  {{- include "plugin.labels" . | nindent 4 }}
  {{- if .Values.openTelemetry.customLabels }}
  {{ toYaml .Values.openTelemetry.customLabels | nindent 4 }}
  {{- end }}
data:
   audit_failover_username_a: {{ .Values.openTelemetry.externalCollector.syslogConfig.openSearchLogs.audit_failover_username_a | b64enc | quote }}
   audit_failover_password_a: {{ .Values.openTelemetry.externalCollector.syslogConfig.openSearchLogs.audit_failover_password_a | b64enc | quote }}
   audit_failover_username_b: {{ .Values.openTelemetry.externalCollector.syslogConfig.openSearchLogs.audit_failover_username_b | b64enc | quote }}
   audit_failover_password_b: {{ .Values.openTelemetry.externalCollector.syslogConfig.openSearchLogs.audit_failover_password_b | b64enc | quote }}
{{- end }}
