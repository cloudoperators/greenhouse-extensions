{{- if .Values.openTelemetry.ingesterCollector.enabled -}}
{{- $cfg := .Values.openTelemetry.ingesterCollector -}}
{{- if gt (len (default (dict) $cfg.streams)) 0 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: logs-ingester-auth
  labels:
  {{- include "plugin.labels" . | nindent 4 }}
  {{- if .Values.openTelemetry.customLabels }}
  {{ toYaml .Values.openTelemetry.customLabels | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  failover_username_a: {{ $cfg.opensearch.failover_username_a | quote }}
  failover_password_a: {{ $cfg.opensearch.failover_password_a | quote }}
  failover_username_b: {{ $cfg.opensearch.failover_username_b | quote }}
  failover_password_b: {{ $cfg.opensearch.failover_password_b | quote }}
{{- end }}
{{- end }}
