{{- if .Values.openTelemetry.logsCollector.syslogTLSConfig.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: logs-syslog-tls
  labels:
  {{- include "plugin.labels" . | nindent 4 }}
spec:
  secretName: logs-syslog-tls
  dnsNames:
    - {{ .Values.openTelemetry.logsCollector.syslogTLSConfig.dnsName }}
  issuerRef:
    name: {{ .Values.openTelemetry.logsCollector.syslogTLSConfig.issuerName }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
