{{- if .Values.openTelemetry.ingesterCollector.enabled -}}
{{- $cfg := .Values.openTelemetry.ingesterCollector -}}
{{- if gt (len (default (dict) $cfg.streams)) 0 }}
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: logs-ingester
  labels:
  {{- include "plugin.labels" . | nindent 4 }}
  {{- if .Values.openTelemetry.customLabels }}
  {{ toYaml .Values.openTelemetry.customLabels | nindent 4 }}
  {{- end }}
spec:
  mode: deployment
  replicas: {{ $cfg.replicas }}
  podAnnotations:
    kubectl.kubernetes.io/default-container: "otc-container"
    secret.reloader.stakater.com/reload: "logs-ingester-auth"
  terminationGracePeriodSeconds: 30
  {{- with $cfg.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  env:
    - name: cluster
      value: "{{ .Values.openTelemetry.cluster }}"
    - name: region
      value: "{{ .Values.openTelemetry.region }}"
  envFrom:
    - secretRef:
        name: logs-ingester-auth
{{- if $cfg.prometheus.podMonitor.enabled }}
  ports:
    - name: prometheus
      port: 8888
{{- end }}
  image: {{ $cfg.image.repository | default .Values.openTelemetry.collectorImage.repository }}:{{ $cfg.image.tag | default .Values.openTelemetry.collectorImage.tag }}
  volumeMounts:
    - name: opensearch-ca
      mountPath: /etc/ssl/opensearch
      readOnly: true
  volumes:
    - name: opensearch-ca
      secret:
        secretName: {{ $cfg.opensearch.tls.caSecret | quote }}
  config:
    receivers:
{{- $kafka := .Values.openTelemetry.kafka -}}
{{- if and $cfg.kafka (gt (len (default (list) $cfg.kafka.brokers)) 0) -}}
{{- $kafka = $cfg.kafka -}}
{{- end }}
{{- range $stream, $sCfg := $cfg.streams }}
      kafka/{{ $stream }}:
        brokers:
{{- range $kafka.brokers }}
          - {{ . }}
{{- end }}
        protocol_version: {{ $kafka.protocol_version }}
        logs:
          topics:
            - {{ $sCfg.topic | quote }}
          encoding: {{ $kafka.encoding }}
        group_id: {{ printf "logs-ingester-%s" $stream | quote }}
        initial_offset: {{ $sCfg.initialOffset | default "latest" | quote }}
        autocommit:
          enable: true
          interval: 1s
        message_marking:
          after: true
          on_error: false
          on_permanent_error: false
        error_backoff:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 3m
{{- end }}
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 30
      attributes/cluster:
        actions:
          - action: insert
            key: k8s.cluster.name
            value: ${cluster}
          - action: insert
            key: region
            value: ${region}
    extensions:
      basicauth/failover_a:
        client_auth:
          username: ${failover_username_a}
          password: ${failover_password_a}
      basicauth/failover_b:
        client_auth:
          username: ${failover_username_b}
          password: ${failover_password_b}
    exporters:
      debug:
        verbosity: basic
{{- range $stream, $sCfg := $cfg.streams }}
      opensearch/{{ $stream }}_failover_a:
        http:
          auth:
            authenticator: basicauth/failover_a
          tls:
            ca_file: /etc/ssl/opensearch/{{ $cfg.opensearch.tls.caSecretKey }}
            insecure: {{ $cfg.opensearch.tls.insecure }}
          endpoint: {{ $cfg.opensearch.endpoint | quote }}
        logs_index: {{ $stream | quote }}
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 5s
          max_elapsed_time: 30s
        timeout: 10s
      opensearch/{{ $stream }}_failover_b:
        http:
          auth:
            authenticator: basicauth/failover_b
          tls:
            ca_file: /etc/ssl/opensearch/{{ $cfg.opensearch.tls.caSecretKey }}
            insecure: {{ $cfg.opensearch.tls.insecure }}
          endpoint: {{ $cfg.opensearch.endpoint | quote }}
        logs_index: {{ $stream | quote }}
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 5s
          max_elapsed_time: 30s
        timeout: 10s
{{- end }}
    connectors:
{{- range $stream, $sCfg := $cfg.streams }}
      failover/opensearch_{{ $stream }}:
        priority_levels:
          - [logs/{{ $stream }}_failover_a]
          - [logs/{{ $stream }}_failover_b]
        retry_interval: 1m
{{- end }}
    service:
      extensions:
        - basicauth/failover_a
        - basicauth/failover_b
{{- if $cfg.prometheus.podMonitor.enabled }}
      telemetry:
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
                    without_type_suffix: false
                    with_resource_constant_labels:
                      included:
                        - k8s_cluster_name
                        - region
        resource:
          k8s_cluster_name: ${cluster}
          region: ${region}
{{- end }}
      pipelines:
{{- range $stream, $sCfg := $cfg.streams }}
        logs/{{ $stream }}:
          receivers: [kafka/{{ $stream }}]
          processors: [memory_limiter, attributes/cluster]
          exporters: [failover/opensearch_{{ $stream }}]
        logs/{{ $stream }}_failover_a:
          receivers: [failover/opensearch_{{ $stream }}]
          exporters: [opensearch/{{ $stream }}_failover_a]
        logs/{{ $stream }}_failover_b:
          receivers: [failover/opensearch_{{ $stream }}]
          exporters: [opensearch/{{ $stream }}_failover_b]
{{- end }}
{{- end }}
{{- end }}
