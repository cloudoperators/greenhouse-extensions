{{- if and (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") .Values.openTelemetry.ingesterCollector.enabled .Values.openTelemetry.ingesterCollector.prometheus.podMonitor.enabled -}}
{{- $cfg := .Values.openTelemetry.ingesterCollector -}}
{{- if gt (len (default (dict) $cfg.streams)) 0 }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: opentelemetry-collector-logs-ingester
  labels:
    {{- include "plugin.labels" . | nindent 4 }}
    {{- if .Values.openTelemetry.customLabels }}
    {{ toYaml .Values.openTelemetry.customLabels | nindent 4 }}
    {{- end }}
    {{- include "plugin.prometheusLabels" . | nindent 4 }}
spec:
  podMetricsEndpoints:
    - interval: 60s
      scrapeTimeout: 50s
      path: /metrics
      scheme: http
      port: prometheus
  selector:
    matchLabels:
      app.kubernetes.io/component: opentelemetry-collector
      app.kubernetes.io/instance: {{ .Release.Namespace }}.logs-ingester
      app.kubernetes.io/managed-by: opentelemetry-operator
      app.kubernetes.io/part-of: opentelemetry
{{- end }}
{{- end }}
