apiVersion: v2
name: opensearch
version: 0.1.8
description: A Helm chart for the OpenSearch operator and cluster
type: application
maintainers:
  - name: timojohlo
  - name: kuckkuck
  - name: joluc
home: https://github.com/sapcc/helm-charts/tree/master/system/opensearch-operator
sources:
  - https://github.com/opensearch-project/opensearch-k8s-operator
appVersion: v3.6.0
dependencies:
  - name: opensearch-operator
    alias: operator
    repository: https://opensearch-project.github.io/opensearch-k8s-operator/
    version: 2.8.4
    condition: operator.enabled
  - name: opensearch-cluster
    alias: cluster
    repository: https://opensearch-project.github.io/opensearch-k8s-operator/
    version: 3.3.0
