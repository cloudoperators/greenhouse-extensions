# OIDC Authentication - disabled by default for local testing
auth:
  oidc:
    enabled: false
    provider: ""
    dashboards:
      clientId: ""
      clientSecret: ""

certManager:
  httpDnsNames:
    - opensearch-logs-client.local
  dashboardsDnsNames:
    - logs.local
  issuer:
    digicert:
      name: opensearch-ca-issuer  # Internal CA instead of Digicert for testing

cluster:
  usersCredentials:
    admin:
      password: "admin"
      hash: "$2y$12$0OYo7uyzgytbPat9qpklL.4PsvvuU0.HX1ZkK7Lq1js/YHXf37VCK"  # bcrypt hash for "admin"
    logs:
      password: "CHANGE_ME_User2025!@#"
    logs2:
      password: "CHANGE_ME_FailoverUser2025$%"
    dashboards:
      username: "dashboards"
      password: "CHANGE_ME_User2025!@#"
    dashboards2:
      password: "CHANGE_ME_FailoverUser2025$%"
  snapshotLifecycle:
    enabled: false
  savedObjects:
    enabled: false
  cluster:
    # Override dashboards configuration for local testing with basic auth
    dashboards:
      additionalConfig:
        opensearch.requestHeadersAllowlist: '["securitytenant","Authorization"]'
        opensearch_security.auth.type: "basicauth"

    # Single nodePool with 3 replicas for local testing. Avoids the
    # cluster-bootstrap deadlock that single-node installs hit when the
    # security plugin can't place the .opendistro_security replica.
    nodePools:
      - component: nodes
        diskSize: 5Gi
        jvm: -Xmx512m -Xms512m
        replicas: 3
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
        roles:
          - cluster_manager
          - data
          - ingest

    ingress:
      opensearch:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/backend-protocol: HTTPS
          nginx.ingress.kubernetes.io/enable-access-log: "false"
          nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-ssl-name: opensearch.opensearch-logs.svc.cluster.local
          nginx.ingress.kubernetes.io/proxy-ssl-secret: opensearch-logs/opensearch-ca-cert
          nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
          nginx.ingress.kubernetes.io/proxy-ssl-verify: "on"
        hosts:
          - host: opensearch-logs-client.local
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - opensearch-logs-client.local
            secretName: opensearch-http-cert-external

      dashboards:
        enabled: true
        className: nginx
        hosts:
          - host: logs.local
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - logs.local
            secretName: opensearch-http-cert

    nodePools:
      - component: main
        diskSize: "2Gi"
        replicas: 1
        roles:
          - "cluster_manager"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: 1
      - component: data
        diskSize: "2Gi"
        replicas: 1
        roles:
          - "data"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "4Gi"
            cpu: 2
      - component: client
        diskSize: "2Gi"
        replicas: 1
        roles:
          - "client"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: 1

siem:
  enabled: true
  certManager:
    httpDnsNames:
      - opensearch-siem-client.local
    dashboardsDnsNames:
      - siem.local
  usersCredentials:
    siemadmin:
      username: "siemadmin"
      password: "admin"
      hash: "$2y$12$0OYo7uyzgytbPat9qpklL.4PsvvuU0.HX1ZkK7Lq1js/YHXf37VCK"  # bcrypt hash for "admin"
    siemlogs:
      username: "siemlogs"
      password: "CHANGE_ME_SIEMUser2025!@#"
    siemlogs2:
      username: "siemlogs2"
      password: "CHANGE_ME_SIEMFailoverUser2025$%"
    siemaudit:
      username: "siemaudit"
      password: "CHANGE_ME_TestPass2025!@#"
    siemaudit2:
      username: "siemaudit2"
      password: "CHANGE_ME_TestFailover2025$%"
    siemdashboards:
      username: "siemdashboards"
      password: "CHANGE_ME_Strong_P@ssw0rd_2025!"
  cluster:
    # Disable monitoring for test environment
    general:
      monitoring:
        enable: false
    # Override dashboards configuration for local testing with basic auth
    dashboards:
      additionalConfig:
        opensearch.requestHeadersAllowlist: '["securitytenant","Authorization"]'
        opensearch_security.auth.type: "basicauth"

    ingress:
      opensearch:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/backend-protocol: HTTPS
          nginx.ingress.kubernetes.io/enable-access-log: "false"
          nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-ssl-name: opensearch-siem.opensearch-logs.svc.cluster.local
          nginx.ingress.kubernetes.io/proxy-ssl-secret: opensearch-logs/opensearch-siem-ca-cert
          nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
          nginx.ingress.kubernetes.io/proxy-ssl-verify: "on"
        hosts:
          - host: opensearch-siem-client.local
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - opensearch-siem-client.local
            secretName: opensearch-siem-http-cert-external

      dashboards:
        enabled: true
        className: nginx
        hosts:
          - host: siem.local
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - siem.local
            secretName: opensearch-siem-http-cert

    nodePools:
      - component: main
        diskSize: "5Gi"
        replicas: 1
        roles:
          - "cluster_manager"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: 1
      - component: data
        diskSize: "5Gi"
        replicas: 1
        roles:
          - "data"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: 2
      - component: client
        diskSize: "5Gi"
        replicas: 1
        roles:
          - "client"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: 1

queryExporter:
  enabled: true
  image:
    registry: docker.io
    repository: joluc/opensearch-query-exporter
    tag: latest
  imagePullPolicy: Always
  logLevel: debug
  credentialsRef: logs
  additionalCredentialsRefs:
    - logs2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  serviceMonitor:
    enabled: false
  queries:
    - name: error_count
      support_group: observability
      service: logs
      interval: 60s
      indices: "logs-*"
      on_error: preserve
      on_missing: drop
      query:
        size: 0
        query:
          bool:
            must:
              - match: { level: "ERROR" }
              - range: { "@timestamp": { gte: "now-5m" } }
    - name: ingestion_rate
      support_group: observability
      service: logs
      interval: 30s
      indices: "logs-*"
      on_error: zero
      on_missing: zero
      query:
        size: 0
        query:
          bool:
            filter:
              - range: { "@timestamp": { gte: "now-1m" } }
