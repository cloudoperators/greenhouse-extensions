# OIDC Authentication - disabled by default for local testing
auth:
  oidc:
    enabled: false
    provider: ""
    dashboards:
      clientId: ""
      clientSecret: ""

certManager:
  httpDnsNames:
    - opensearch-logs-client.local
  dashboardsDnsNames:
    - logs.local
  issuer:
    digicert:
      name: opensearch-ca-issuer  # Internal CA instead of Digicert for testing

cluster:
  usersCredentials:
    admin:
      password: "admin"
      hash: "$2y$12$0OYo7uyzgytbPat9qpklL.4PsvvuU0.HX1ZkK7Lq1js/YHXf37VCK"  # bcrypt hash for "admin"
    logs:
      password: "CHANGE_ME_User2025!@#"
    logs2:
      password: "CHANGE_ME_FailoverUser2025$%"
    dashboards:
      username: "dashboards"
      password: "CHANGE_ME_User2025!@#"
    dashboards2:
      password: "CHANGE_ME_FailoverUser2025$%"
  snapshotLifecycle:
    enabled: true
    streams:
      - name: hermes
        repository:
          name: hermes-snapshots
          type: s3
          settings:
            bucket: hermes-snapshots
            base_path: hermes
            client: default
        indexPatterns:
          hot: ".ds-hermes-*"
          remote: "remote_.ds-hermes-*"
        minSize: "50gb"
        retention:
          local: "7d"
          remote: "31d"
          snapshot: "93d"
  cluster:
    # Disable monitoring for local test environment
    general:
      monitoring:
        enable: false
      # repository-s3 is required for the snapshot-lifecycle install Job to
      # register S3 snapshot repositories.
      pluginsList:
        - repository-s3
    # Single-node deployment for resource-constrained kind clusters.
    # Bumped memory above the 1Gi default so the JVM heap (auto-set to half the
    # request) has enough headroom to avoid OOM during cluster bootstrap.
    nodePools:
      - component: node
        diskSize: "10Gi"
        replicas: 1
        roles:
          - "cluster_manager"
          - "data"
          - "ingest"
        resources:
          requests:
            memory: "3Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
    # Override dashboards configuration for local testing with basic auth
    dashboards:
      additionalConfig:
        opensearch.requestHeadersAllowlist: '["securitytenant","Authorization"]'
        opensearch_security.auth.type: "basicauth"

    ingress:
      opensearch:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/backend-protocol: HTTPS
          nginx.ingress.kubernetes.io/enable-access-log: "false"
          nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-ssl-name: opensearch.opensearch-logs.svc.cluster.local
          nginx.ingress.kubernetes.io/proxy-ssl-secret: opensearch-logs/opensearch-ca-cert
          nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
          nginx.ingress.kubernetes.io/proxy-ssl-verify: "on"
        hosts:
          - host: opensearch-logs-client.local
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - opensearch-logs-client.local
            secretName: opensearch-http-cert-external

      dashboards:
        enabled: true
        className: nginx
        hosts:
          - host: logs.local
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - logs.local
            secretName: opensearch-http-cert
