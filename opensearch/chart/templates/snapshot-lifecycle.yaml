{{- if .Values.cluster.snapshotLifecycle.enabled }}
{{- $cfg := .Values.cluster.snapshotLifecycle }}
{{- $configFiles := dict }}
{{- range $stream := $cfg.streams }}
  {{- $_ := set $configFiles (printf "ds-%s-ism.json" $stream.name) (tpl ($.Files.Get "files/snapshot-lifecycle/ds-ism-policy.json.tpl") $stream) }}
  {{- $_ := set $configFiles (printf "remote-%s-ism.json" $stream.name) (tpl ($.Files.Get "files/snapshot-lifecycle/remote-ism-policy.json.tpl") $stream) }}
  {{- $_ := set $configFiles (printf "snapshot-%s-delete-policy.json" $stream.name) (tpl ($.Files.Get "files/snapshot-lifecycle/sm-policy.json.tpl") $stream) }}
  {{- $_ := set $configFiles (printf "snapshot-repo-%s.json" $stream.name) (tpl ($.Files.Get "files/snapshot-lifecycle/repo.json.tpl") $stream) }}
{{- end }}
{{- $_ := set $configFiles "install.py" ($.Files.Get "files/snapshot-lifecycle/install.py") }}
{{- $streamNames := list }}
{{- range $stream := $cfg.streams }}
  {{- $streamNames = append $streamNames $stream.name }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cfg.configMapName | default "opensearch-snapshot-lifecycle" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensearch.labels" . | nindent 4 }}
data:
{{- range $name, $content := $configFiles }}
  {{ $name }}: |
{{ $content | indent 4 }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $cfg.jobName | default "opensearch-snapshot-lifecycle" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensearch.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ $cfg.backoffLimit | default 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ toJson $configFiles | sha256sum }}
      labels:
        {{- include "opensearch.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with $cfg.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: install
          image: "{{ $cfg.image.repository }}:{{ $cfg.image.tag }}"
          imagePullPolicy: {{ $cfg.image.pullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              pip install --quiet --no-cache-dir requests
              python3 /scripts/install.py
          env:
            - name: CLUSTER_HOST
              value: {{ tpl $cfg.clusterHost . | quote }}
            - name: STREAMS
              value: {{ $streamNames | join " " | quote }}
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $cfg.adminSecret.name }}
                  key: {{ $cfg.adminSecret.usernameKey | default "username" }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $cfg.adminSecret.name }}
                  key: {{ $cfg.adminSecret.passwordKey | default "password" }}
          {{- with $cfg.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: {{ $cfg.configMapName | default "opensearch-snapshot-lifecycle" }}
            defaultMode: 0755
{{- end }}
