apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-test
  namespace: {{ .Release.Namespace }}
  labels:
    type: integration-test
    {{- include "opensearch.labels" . | nindent 4 }}
data:
  run.sh: |-

    #!/usr/bin/env bats

    load "/usr/lib/bats/bats-detik/utils"
    load "/usr/lib/bats/bats-detik/detik"

    DETIK_CLIENT_NAME="kubectl"
    DETIK_CLIENT_NAMESPACE="{{ .Release.Namespace }}"

{{- if .Values.operator.enabled }}
    @test "Verify successful deployment and running status of the operator pod" {
        try "at most 5 times every 5s to get pods named 'opensearch-operator-[a-z0-9]+-[a-z0-9]+' and verify that '.status.phase' is 'Running'"
    }
{{- end }}

    @test "Verify presence of OpenSearchCluster resource" {
      [ "$(kubectl get opensearchclusters.opensearch.org -n {{ .Release.Namespace }} --no-headers | wc -l)" -ge 1 ]
    }

    @test "Verify presence of OpenSearchIndexTemplate resource" {
      [ "$(kubectl get opensearchindextemplates.opensearch.org -n {{ .Release.Namespace }} --no-headers | wc -l)" -ge 1 ]
    }

    @test "Verify presence of OpenSearchRole resource" {
      [ "$(kubectl get opensearchroles.opensearch.org -n {{ .Release.Namespace }} --no-headers | wc -l)" -ge 1 ]
    }

    @test "Verify presence of OpenSearchUser resource" {
      [ "$(kubectl get opensearchusers.opensearch.org -n {{ .Release.Namespace }} --no-headers | wc -l)" -ge 1 ]
    }

    @test "Verify presence of OpenSearchUserRoleBinding resource" {
      [ "$(kubectl get opensearchuserrolebindings.opensearch.org -n {{ .Release.Namespace }} --no-headers | wc -l)" -ge 1 ]
    }

    @test "Verify presence of OpenSearchISMPolicy resource" {
      [ "$(kubectl get opensearchismpolicies.opensearch.org -n {{ .Release.Namespace }} --no-headers | wc -l)" -ge 1 ]
    }

    @test "Verify presence of OpenSearchComponentTemplate resource" {
      [ "$(kubectl get opensearchcomponenttemplates.opensearch.org -n {{ .Release.Namespace }} --no-headers | wc -l)" -ge 1 ]
    }

    @test "Verify presence of OpenSearchTenant resource" {
      [ "$(kubectl get opensearchtenants.opensearch.org -n {{ .Release.Namespace }} --no-headers | wc -l)" -ge 0 ]
    }

    # ===== OpenSearch Cluster Tests =====

    {{- range $pool := .Values.cluster.cluster.nodePools }}
    @test "Verify OpenSearch {{ $pool.component }} pod is running" {
        try "at most 20 times every 15s to get pods named '{{ $.Values.cluster.cluster.name }}-{{ $pool.component }}-' and verify that '.status.phase' is 'Running'"
    }
    {{- end }}

    # The dashboards pod will not be scheduled if the ServiceMonitor CRD is missing. If the following test fails, please ensure the ServiceMonitor CRD is installed (e.g. via the kube-monitoring plugin).
    @test "Verify OpenSearch dashboards pod is running" {
        try "at most 24 times every 15s to get pods named '{{ .Values.cluster.cluster.name }}-dashboards-' and verify that '.status.phase' is 'Running'"
    }

    {{- range $pool := .Values.cluster.cluster.nodePools }}
    @test "Verify OpenSearch {{ $pool.component }} service exists" {
        try "at most 5 times every 5s to get services named '{{ $.Values.cluster.cluster.name }}-{{ $pool.component }}' and verify that '.metadata.name' is '{{ $.Values.cluster.cluster.name }}-{{ $pool.component }}'"
    }
    {{- end }}

{{- end -}}
