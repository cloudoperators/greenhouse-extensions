{{- if .Values.queryExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensearch.query-exporter-name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensearch.query-exporter-labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.queryExporter.port | default 9206 }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "opensearch.query-exporter-selector" . | nindent 4 }}
{{- end }}
