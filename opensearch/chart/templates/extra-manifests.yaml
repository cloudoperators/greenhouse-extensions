{{- range .Values.extraManifests }}
{{- if kindIs "map" . }}
---
{{ toYaml . }}
{{- else if kindIs "string" . }}
---
{{ tpl . $ }}
{{- else }}
{{- fail (printf "extraManifests: unsupported entry type %s (expected string or map)" (kindOf .)) }}
{{- end }}
{{- end }}
