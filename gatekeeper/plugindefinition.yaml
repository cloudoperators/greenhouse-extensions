apiVersion: greenhouse.sap/v1alpha1
kind: PluginDefinition
metadata:
  name: gatekeeper
spec:
  version: 1.0.0
  displayName: OPA Gatekeeper
  description: |
    Policy controller for Kubernetes admission based on the Open Policy Agent
    (OPA) constraint framework. Deploys upstream OPA Gatekeeper. Constraint
    templates and constraints are not bundled; install them separately or
    use the gatekeeper-config PluginDefinition (planned).
  docMarkDownUrl: https://raw.githubusercontent.com/cloudoperators/greenhouse-extensions/main/gatekeeper/README.md
  icon: https://raw.githubusercontent.com/open-policy-agent/gatekeeper/master/logo/gatekeeper-horizontal-color.png
  helmChart:
    name: gatekeeper
    repository: https://open-policy-agent.github.io/gatekeeper/charts
    version: 3.22.2
  options:
    - name: replicas
      displayName: Controller replicas
      description: Number of gatekeeper-controller-manager replicas. Use 2 or more for high availability.
      default: 3
      required: false
      type: int
    - name: auditInterval
      displayName: Audit interval (seconds)
      description: How often the audit pod scans cluster resources for constraint violations.
      default: 60
      required: false
      type: int
    - name: validatingWebhookFailurePolicy
      displayName: Webhook failure policy
      description: Action when the validating webhook is unavailable. "Ignore" allows requests through; "Fail" blocks them.
      default: Ignore
      required: false
      type: string
    - name: constraintViolationsLimit
      displayName: Constraint violations limit
      description: Maximum number of violations reported per constraint during audit.
      default: 20
      required: false
      type: int
    - name: logDenies
      displayName: Log denied requests
      description: When true, denied admission requests are logged at info level.
      default: false
      required: false
      type: bool
    - name: disabledBuiltins
      displayName: Disabled Rego built-in functions
      description: List of Rego built-ins that are unavailable to policies, in Gatekeeper's brace-wrapped syntax. Upstream disables `{http.send}` by default; override to an empty list if your policies need to call external services (e.g. helm-manifest-parser, doop-image-checker).
      default:
        - "{http.send}"
      required: false
      type: list
    - name: validatingWebhookCustomRules
      displayName: Validating webhook custom rules
      description: Custom rules limiting which API groups, versions, operations, and resources the validating webhook intercepts. Empty (default) keeps upstream's catch-all. Useful on Gardener shoots and other specialized cluster types where the broad scope interferes with node join or maintenance. See README.
      required: false
      type: list
    - name: validatingWebhookObjectSelector
      displayName: Validating webhook object selector
      description: Label selector that exempts matching objects from webhook interception. Empty (default) means no exclusion.
      required: false
      type: map
    - name: validatingWebhookExemptNamespacesLabels
      displayName: Validating webhook exempt namespaces labels
      description: Map of namespace label keys to values; matching namespaces are exempted from webhook interception.
      required: false
      type: map
    - name: validatingWebhookCheckIgnoreFailurePolicy
      displayName: Check-ignore-label webhook failure policy
      description: Failure policy for the `check-ignore-label.gatekeeper.sh` webhook, which guards the `admission.gatekeeper.sh/ignore` namespace label. Upstream defaults to `Fail`, which can block Gardener shoots when the webhook server is briefly unavailable during maintenance. Defaults to `Ignore` here.
      default: Ignore
      required: false
      type: string
    - name: validatingWebhookTimeoutSeconds
      displayName: Validating webhook timeout (seconds)
      description: Timeout applied to both validating webhooks. Upstream default of 3s is kept; tune up if the webhook server runs under load.
      default: 3
      required: false
      type: int
