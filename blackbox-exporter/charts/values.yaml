blackbox-exporter:
  extraArgs:
    - --log.level=warn
    - --log.prober=warn

  # @ignored
  config:
    modules:
      # http_2xx:
      #   prober: http
      #   timeout: 5s
      #   http:
      #     valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      #     follow_redirects: true
      #     #preferred_ip_protocol: "ip4"
      ping:
        prober: icmp
        timeout: 5s
        icmp:
          preferred_ip_protocol: "ip4"
      ssh_banner:
        prober: tcp
        timeout: 10s
        tcp:
          query_response:
          - expect: "^SSH-2.0-"
          - send: "SSH-2.0-blackbox-ssh-check"
      grpc-prober:
        prober: grpc
        grpc:
          tls: true
          tls_config:
            ca_file: /etc/blackbox/tls/ca.crt
            cert_file: /etc/blackbox/tls/tls.crt
            key_file: /etc/blackbox/tls/tls.key

  serviceMonitor:
    ## If true, a ServiceMonitor CRD is created for a prometheus operator
    ## https://github.com/coreos/prometheus-operator for blackbox-exporter itself
    ##
    selfMonitor:
      enabled: true

  # Store the configuration as a `Secret` instead of a `ConfigMap`, useful in case it contains sensitive data
  # @ignored
  secretConfig: true
