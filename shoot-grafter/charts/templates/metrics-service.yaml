apiVersion: v1
kind: Service
metadata:
  name: shoot-grafter-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: shoot-grafter
spec:
  type: ClusterIP
  selector:
    app: shoot-grafter
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP